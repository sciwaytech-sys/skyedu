
    <style>
      :root{
        --max:1100px; --r:18px; --stroke:rgba(0,0,0,.08);
        --shadow:0 10px 25px rgba(0,0,0,.08);
        --bg:#f6f7fb; --card:#fff; --muted:#6b7280;
      }
      .skyed-wrap{max-width:var(--max);margin:0 auto;padding:18px 14px 60px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
      .skyed-hero{background:linear-gradient(90deg,#2563eb,#38bdf8);color:#fff;border-radius:20px;padding:16px 16px 12px;margin-bottom:14px;}
      .skyed-hero h2{margin:0;font-size:20px;}
      .skyed-hero .sub{opacity:.9;margin-top:6px;font-size:13px;}
      .skyed-h3{font-size:14px;margin:16px 0 10px;color:#0f172a;font-weight:800;}
      .skyed-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;}
      @media (max-width:980px){.skyed-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
      @media (max-width:620px){.skyed-grid{grid-template-columns:1fr;}}
      .skyed-card{background:var(--card);border:1px solid var(--stroke);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;}
      .skyed-media{aspect-ratio:4/3;background:#eef2ff;}
      .skyed-media img{width:100%;height:100%;object-fit:contain;display:block;} /* contain fixes “cut” images */
      .skyed-bd{padding:12px 12px 14px;display:flex;flex-direction:column;gap:10px;}
      .skyed-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;}
      .skyed-en{font-weight:900;font-size:18px;}
      .skyed-zh{font-weight:650;color:var(--muted);}
      audio{width:100%;}
      .skyed-box{background:#fff;border:1px solid var(--stroke);border-radius:18px;box-shadow:var(--shadow);padding:14px;margin-top:10px;}
      .skyed-sent{display:flex;gap:12px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;padding:10px 0;border-bottom:1px dashed rgba(0,0,0,.08);}
      .skyed-sent:last-child{border-bottom:0;}
      .skyed-sent .txt{font-weight:800;color:#0f172a;flex:1;min-width:260px;}
      .skyed-sent .aud{flex:1;min-width:260px;}
      .skyed-qa{padding:10px 0;border-bottom:1px dashed rgba(0,0,0,.08);}
      .skyed-qa:last-child{border-bottom:0;}
      .skyed-q{font-weight:900;}
      .skyed-a{color:#111827;margin-top:6px;}
      iframe{width:100%;height:900px;border:0;border-radius:16px;box-shadow:var(--shadow);}
      .skyed-note{font-size:12px;color:var(--muted);margin-top:6px;}
    </style>
    
    <div class="skyed-wrap">
      <div class="skyed-hero">
        <h2>Homework</h2>
        <div class="sub">Vocabulary → Sentence Practice → Quiz</div>
      </div>

      <div class="skyed-h3">Vocabulary（词汇）</div>
      <div class="skyed-grid">
        
      </div>
      <div class="skyed-note">Say each word 2 times + make 1 full sentence.</div>

      <div class="skyed-h3">Sentences（A）</div>
      <div class="skyed-box">
        <div class="skyed-note">No sentences found.</div>
      </div>

      <div class="skyed-h3">Questions and answers（B）</div>
      <div class="skyed-box">
        <div class="skyed-note">No Q&A found.</div>
      </div>

      <div class="skyed-h3">Quiz</div>
      <iframe src="index.html" loading="lazy"></iframe>
    </div>
