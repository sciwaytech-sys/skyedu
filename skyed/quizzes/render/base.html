<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="skin.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">Sky</div>
        <div class="brand-text">
          <div class="brand-title">{{TITLE}}</div>
          <div class="brand-sub">Interactive Quiz Pack</div>
        </div>
      </div>
      <div class="score">
        <span id="scoreNow">0</span> / <span id="scoreMax">0</span>
      </div>
    </header>

    <main class="content">
      <div id="quizHost"></div>
    </main>

    <footer class="bottombar">
      <button class="btn" id="btnPrev">Back</button>
      <div class="progress"><span id="idxNow">1</span> / <span id="idxMax">1</span></div>
      <button class="btn primary" id="btnNext">Next</button>
    </footer>
  </div>

  <script src="runtime.js"></script>
  <script>
    window.SKYED_BOOT && window.SKYED_BOOT({ jsonUrl: "quiz.json" });
  </script>
</body>
</html>
