<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#0b2a3a"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#g)"/>
  <!-- board -->
  <rect x="300" y="90" width="600" height="220" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
  <!-- table -->
  <rect x="520" y="360" width="260" height="60" rx="14" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)"/>
  <rect x="560" y="420" width="24" height="150" rx="10" fill="rgba(255,255,255,0.08)"/>
  <rect x="716" y="420" width="24" height="150" rx="10" fill="rgba(255,255,255,0.08)"/>
  <!-- chairs -->
  <rect x="820" y="470" width="120" height="50" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
  <rect x="880" y="520" width="28" height="160" rx="12" fill="rgba(255,255,255,0.07)"/>
  <rect x="720" y="600" width="120" height="50" rx="12" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.16)"/>
  <!-- box -->
  <rect x="190" y="520" width="120" height="110" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
  <!-- bag -->
