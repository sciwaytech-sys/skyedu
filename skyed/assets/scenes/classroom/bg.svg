  <!-- rug -->
  <rect x="420" y="650" width="360" height="110" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
  <text x="40" y="60" fill="rgba(255,255,255,0.35)" font-family="Segoe UI, Arial" font-size="28">Classroom Scene (placeholder)</text>
</svg>
