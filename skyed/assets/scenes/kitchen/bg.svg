<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#132433"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#g)"/>
  <!-- cabinets -->
  <rect x="690" y="120" width="420" height="120" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
  <!-- shelf -->
  <rect x="780" y="200" width="260" height="18" rx="9" fill="rgba(34,211,238,0.18)"/>
  <!-- fridge -->
  <rect x="110" y="180" width="210" height="390" rx="22" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)"/>
  <rect x="130" y="210" width="170" height="150" rx="16" fill="rgba(255,255,255,0.04)"/>
  <rect x="130" y="390" width="170" height="160" rx="16" fill="rgba(255,255,255,0.04)"/>
  <!-- counter/sink -->
  <rect x="430" y="420" width="560" height="80" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
  <rect x="650" y="438" width="180" height="46" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="700" y="396" width="26" height="42" rx="10" fill="rgba(34,211,238,0.18)"/>
  <!-- bin -->
  <rect x="150" y="590" width="140" height="160" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
  <!-- floor -->
  <rect x="0" y="540" width="1200" height="260" fill="rgba(255,255,255,0.03)"/>
  <text x="40" y="60" fill="rgba(255,255,255,0.35)" font-family="Segoe UI, Arial" font-size="28">Kitchen Scene (placeholder)</text>
</svg>
