<div class="card">
  <div class="card-hd">
    <div class="qtitle">{{PROMPT}}</div>
    <div class="qtitle zh">{{PROMPT_ZH}}</div>
  </div>

  <div class="dd-wrap">
    <div class="scene">
      <img class="scene-bg" src="{{SCENE_BG}}" alt="scene" />
      <div class="zones" id="zones"></div>
      <div class="sprite" id="sprite" draggable="true">
        <img src="{{SPRITE_SRC}}" alt="sprite" />
      </div>
    </div>

    <div class="side">
      <div class="pill-row" id="choiceRow"></div>
      <div class="help">
        <button class="btn" id="btnHint">Hint</button>
        <div class="hint" id="hintBox"></div>
      </div>
      <div class="result" id="resultBox"></div>
    </div>
  </div>
</div>
